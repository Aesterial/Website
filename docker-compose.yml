services:
  backend:
    image: ivanskem/aesterial-jcup:backend-latest
    volumes:
      - ./db.ca.crt:/certs/ca.crt:ro
    restart: unless-stopped
    networks: [appnet]
    expose:
      - "8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=verify-ca&sslrootcert=/certs/ca.crt"
      COOKIES_NAME: ${COOKIES_NAME}
      COOKIES_SECRET: ${COOKIES_SECRET}
      COOKIES_SAMESITE: ${COOKIES_SAMESITE}
      COOKIES_SECURE: ${COOKIES_SECURE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      START_PORT: ${START_PORT}
      SERVICES_IP: ${SERVICES_IP}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE}
      MAILER_API_KEY: ${MAILER_API_KEY}
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME}

  frontend:
    image: ivanskem/aesterial-jcup:frontend-latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NODE_OPTIONS: "--max-old-space-size=512"
    networks: [appnet]
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/aesterial/ssl:/etc/caddy/ssl:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [appnet]
    depends_on:
      - frontend
      - backend

networks:
  appnet:

volumes:
  caddy_data:
  caddy_config:
