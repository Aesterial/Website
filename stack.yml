version: "3.8"

services:
  backend:
    image: ivanskem/aesterial-jcup:backend-latest
    networks: [appnet]
    volumes:
      - type: bind
        source: ./db.ca.crt
        target: /certs/ca.crt
        read_only: true
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      COOKIES_NAME: "${COOKIES_NAME}"
      COOKIES_SECRET: "${COOKIES_SECRET}"
      COOKIES_SAMESITE: ${COOKIES_SAMESITE}
      COOKIES_SECURE: "${COOKIES_SECURE}"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      START_PORT: ${START_PORT}
      SERVICES_IP: ${SERVICES_IP}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_USE_SSL: "${STORAGE_USE_SSL}"
      STORAGE_FORCE_PATH_STYLE: "${STORAGE_FORCE_PATH_STYLE}"
      MAILER_API_KEY: ${MAILER_API_KEY}
      MAILER_FROM_EMAIL: ${MAILER_FROM_EMAIL}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: start-first
        monitor: 30s
      restart_policy:
        condition: on-failure

  frontend:
    image: ivanskem/aesterial-jcup:frontend-latest
    networks: [appnet]
    environment:
      NODE_ENV: production
      PORT: "3000"
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: start-first
        monitor: 30s
      restart_policy:
        condition: on-failure

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    networks: [appnet]
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  appnet:
    driver: overlay

volumes:
  caddy_data:
  caddy_config: