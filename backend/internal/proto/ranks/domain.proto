syntax = "proto3";

package ranks.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "permissions/domain.proto";
import "user/domain.proto";

option go_package = "Aesterial/backend/internal/gen/ranks/v1;ranks";

message CreateRequest {
  optional permissions.v1.Permissions permissions = 1;
  string name = 2;
  uint32 color = 3;
  optional string description = 4;
}

message PatchRequest {
  string name = 1;
  string target = 2;
  google.protobuf.Value value = 3;
}

message NameRequest {
  string name = 1;
}


message PermsPatchRequest {
  string name = 1;
  string perm = 2;
  bool state = 3;
}

message UsersResponse {
  uint32 len = 1;
  repeated user.v1.UserPublic users = 2;
  string tracing = 3;
}

message Rank {
  string name = 1;
  uint32 color = 2;
  string description = 3;
  google.protobuf.Timestamp added = 4;
  int32 weight = 5;
}

message RankResponse {
  Rank data = 1;
  string tracing = 2;
}

message RanksResponse {
  repeated Rank ranks = 2;
  string tracing = 3;
}

message ActivationGenerateRequest {
  uint32 limit = 1;
  uint32 weight = 2;
}

message ActivationGenerateResponse {
  repeated string list = 1;
  string tracing = 2;
}
