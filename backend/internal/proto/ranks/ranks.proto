syntax = "proto3";

package ranks.v1;
option go_package = "ascendant/backend/internal/gen/ranks/v1;ranks";

import "google/api/annotations.proto";
import "ranks/domain.proto";

service RanksService {
  rpc Create(CreateRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/ranks/create"
      body: "*"
    };
  }
  rpc Patch(CreateRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      patch: "/api/ranks/{name}/patch"
      body: "*"
    };
  }
  rpc Delete(DeleteRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      delete: "/api/ranks/{name}/delete",
    };
  }
}
