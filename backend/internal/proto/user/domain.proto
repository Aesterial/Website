syntax = "proto3";

package user.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "Aesterial/backend/internal/gen/user/v1;user";

message UserPublic {
  uint32 userID = 1;
  string username = 2;
  Rank rank = 3;
  optional UserPublicSettings settings = 4;
  bool banned = 5;
  google.protobuf.Timestamp joinedAt = 6;
  optional google.protobuf.Timestamp activeAt = 7;
}

message UserSelf {
  UserPublic public = 1;
  UserSettings settings = 2;
  UserEmail email = 3;
}

message Avatar {
  string contentType = 1;
  string url = 3;
  string key = 4;
  reserved 2;
  reserved "data";
}

message UserSettings {
  optional string displayName = 1;
  string description = 2;
  optional Avatar avatar = 3;
  int32 sessionLiveTime = 4;
  bool totp_enabled = 5;
}

message UserPublicSettings {
  optional string displayName = 1;
  string description = 2;
  optional Avatar avatar = 3;
}

message Rank {
  string name = 1;
  uint32 color = 2;
  optional google.protobuf.Timestamp expires = 3;
}

message UserEmail {
  string address = 1;
  bool verified = 2;
}

message RevokeSessionRequest {
    string id = 1;
}

message Session {
  string uuid = 1;
  google.protobuf.Timestamp created = 2;
  google.protobuf.Timestamp lastSeen = 3;
  string hash = 4;
}

message OtherUserRequest {
  uint32 userID = 1;
}

message OtherUserPermsPatchRequest {
  uint32 userID = 1;
  string perm = 2;
  bool state = 3;
}

message BanUserRequest {
  uint32 userID = 1;
  string reason = 2;
  optional google.protobuf.Duration duration = 3;
}

message SendMessageRequest {
  uint32 userID = 1;
  string message = 2;
}

message Message {
  string from = 1;
  string text = 2;
  google.protobuf.Timestamp at = 3;
}

message ChangeSelfNameRequest {
  string name = 1;
}

message ChangeSelfDescriptionRequest {
  string description = 1;
}

message UserSelfResponse {
  UserSelf data = 1;
  string tracing = 2;
}

message UserPublicResponse {
  UserPublic data = 1;
  string tracing = 2;
}

message UsersResponse {
  repeated UserPublic data = 1;
  string tracing = 2;
}

message UserSessionsResponse {
  repeated Session data = 1;
  string tracing = 2;
}

message MessagesResponse {
  repeated Message messages = 1;
  string tracing = 2;
}

message BanInfoResponse {
  string id = 1;
  UserPublic executor = 2;
  string reason = 3;
  google.protobuf.Timestamp at = 4;
  optional google.protobuf.Timestamp expires = 5;
  string tracing = 6;
}

message HasPermissionRequest {
  uint32 userID = 1;
  string perm = 2;
}

message PermissionsRequest {
  uint32 userID = 1;
}

message HasPermissionResponse {
  bool has = 1;
  string tracing = 2;
}

message SetRankRequest {
  uint32 userID = 1;
  string rank = 2;
  optional google.protobuf.Timestamp expires = 3;
}

message ActivateRankRequest {
    string code = 1;
}

message ActivateRankResponse {
    string rank = 1;
    string tracing = 2;
}
