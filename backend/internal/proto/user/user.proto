syntax = "proto3";

package user.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "permissions/domain.proto";
import "types.proto";
import "user/domain.proto";

option go_package = "Aesterial/backend/internal/gen/user/v1;user";

service UserService {
  rpc Self(google.protobuf.Empty) returns (UserSelfResponse) {
    option (google.api.http) = {get: "/api/user"};
  }
  rpc Other(OtherUserRequest) returns (UserPublicResponse) {
    option (google.api.http) = {get: "/api/user/{userID}"};
  }
  rpc Users(google.protobuf.Empty) returns (UsersResponse) {
    option (google.api.http) = {get: "/api/user/list"};
  }
  rpc Sessions(google.protobuf.Empty) returns (UserSessionsResponse) {
    option (google.api.http) = {get: "/api/user/sessions"};
  }
  rpc RevokeSession(RevokeSessionRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/sessions/revoke/{id}"
      body: "*"
    };
  }
  rpc Ban(BanUserRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/{userID}/ban"
      body: "*"
    };
  }
  rpc Unban(OtherUserRequest) returns (types.WithTracing) {
    option (google.api.http) = {post: "/api/user/{userID}/unban"};
  }
  rpc BanInfo(google.protobuf.Empty) returns (BanInfoResponse) {
    option (google.api.http) = {get: "/api/user/ban/info"};
  }
  rpc BanInfoOther(OtherUserRequest) returns (BanInfoResponse) {
    option (google.api.http) = {get: "/api/user/{userID}/ban/info"};
  }
  rpc UpdateSelfName(ChangeSelfNameRequest) returns (types.WithTracing) {
    option (google.api.http) = {patch: "/api/user/change/name/{name}"};
  }
  rpc UpdateSelfDescription(ChangeSelfDescriptionRequest) returns (types.WithTracing) {
    option (google.api.http) = {patch: "/api/user/change/description/{description}"};
  }
  rpc UpdateSelfAvatar(Avatar) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/avatar"
      body: "*"
    };
  }
  rpc DeleteSelfAvatar(google.protobuf.Empty) returns (types.WithTracing) {
    option (google.api.http) = {delete: "/api/user/delete/avatar"};
  }
  rpc DeleteUserAvatar(OtherUserRequest) returns (types.WithTracing) {
    option (google.api.http) = {delete: "/api/user/{userID}/delete/avatar"};
  }
  rpc SendMessage(SendMessageRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/{userID}/messages/send"
      body: "*"
    };
  }
  rpc SetRank(SetRankRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/{userID}/rank/set"
      body: "*"
    };
  }
  rpc Messages(google.protobuf.Empty) returns (MessagesResponse) {
    option (google.api.http) = {get: "/api/user/messages"};
  }
  rpc HasPermissions(HasPermissionRequest) returns (HasPermissionResponse) {
    option (google.api.http) = {get: "/api/user/{userID}/permissions/has/{perm}"};
  }
  rpc Permissions(OtherUserRequest) returns (permissions.v1.PermissionsResponse) {
    option (google.api.http) = {get: "/api/user/{userID}/permissions"};
  }
  rpc ChangePerms(OtherUserPermsPatchRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/user/{userID}/permissions/patch/{perm}"
      body: "*"
    };
  }
  rpc DeleteProfile(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/user/delete/profile"
      body: "*"
    };
  }
  rpc ActivateRank(ActivateRankRequest) returns (ActivateRankResponse) {
    option (google.api.http) = {
      post: "/api/user/activate/rank"
      body: "*"
    };
  }
}
