syntax = "proto3";

package user.v1;
option go_package = "ascendant/backend/internal/gen/user/v1;user";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "user/domain.proto";

service UserService {
  // Information
  rpc Self(google.protobuf.Empty) returns (UserSelfResponse) {
    option (google.api.http) = {
      get: "/api/user"
    };
  }
  rpc Other(OtherUserRequest) returns (UserPublicResponse) {
    option (google.api.http) = {
      get: "/api/user/{userID}"
    };
  }
  rpc Sessions(google.protobuf.Empty) returns (UserSessionsResponse) {
    option (google.api.http) = {
      get: "/api/user/sessions"
    };
  }
  // Management
  rpc Ban(BanUserRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/user/{userID}/ban"
      body: "*"
    };
  }
  rpc Unban(OtherUserRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/user/{userID}/unban"
    };
  }
  rpc UpdateSelfName(ChangeSelfNameRequest) returns (EmptyResponse) {   
    option (google.api.http) = {
      patch: "/api/user/change/name/{name}"
    };
  }
  rpc DeleteSelfAvatar(google.protobuf.Empty) returns (EmptyResponse) { 
    option (google.api.http) = {
      delete: "/api/user/delete/avatar"
    };
  }
  rpc DeleteUserAvatar(OtherUserRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      delete: "/api/user/{userID}/delete/avatar"
    };
  }
  rpc SendMessage(SendMessageRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/user/{userID}/messages/send"
      body: "*"
    };
  }
  rpc Messages(google.protobuf.Empty) returns (MessagesResponse) {
    option (google.api.http) = {
      get: "/api/user/messages"
    };
  }
}
