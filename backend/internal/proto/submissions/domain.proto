syntax = "proto3";

package submissions.v1;

import "projects/domain.proto";

option go_package = "Aesterial/backend/internal/gen/submissions/v1;submissions";

message GetRequest {
  int32 id = 1;
}

message ApproveRequest {
  int32 id = 1;
}

message DeclineRequest {
  int32 id = 1;
  string reason = 2;
}

message Target {
  int32 id = 1;
  projects.v1.Project info = 2;
  string state = 3;
  string reason = 4;
}

message ListResponse {
  repeated Target data = 1;
  string tracing = 2;
}

message GetResponse {
  Target data = 1;
  string tracing = 2;
}
