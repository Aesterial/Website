syntax = "proto3";
package tickets.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "tickets/domain.proto";
import "types.proto";

option go_package = "Aesterial/backend/internal/gen/tickets/v1;tickets";

service TicketsService {
  rpc Create(CreateRequest) returns (CreateResponse) {
    option (google.api.http) = {
      post: "/api/tickets/create"
      body: "*"
    };
  }
  rpc Info(TicketInfoRequest) returns (TicketInfoResponse) {
    option (google.api.http) = {get: "/api/tickets/{id}/info"};
  }
  rpc Messages(TicketInfoRequest) returns (TicketMessagesResponse) {
    option (google.api.http) = {get: "/api/tickets/{id}/messages/list"};
  }
  rpc MessageCreate(TicketMessageCreate) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/tickets/{id}/messages/create"
      body: "*"
    };
  }
  rpc CloseTicket(CloseTicketRequest) returns (types.WithTracing) {
    option (google.api.http) = {
      post: "/api/tickets/{id}/close"
      body: "*"
    };
  }
  rpc AcceptTicket(TicketInfoRequest) returns (types.WithTracing) {
    option (google.api.http) = {post: "/api/tickets/{id}/accept"};
  }
  rpc List(google.protobuf.Empty) returns (TicketsListResponse) {
    option (google.api.http) = {get: "/api/tickets/list"};
  }
  rpc Self(google.protobuf.Empty) returns (TicketsListResponse) {
    option (google.api.http) = {get: "/api/tickets/self"};
  }
  rpc IsValid(IsValidRequest) returns (IsValidResponse) {
    option (google.api.http) = {get: "/api/tickets/{id}/requestor/{token}"};
  }
}
