syntax = "proto3";
package tickets.v1;

import "google/protobuf/timestamp.proto";
import "user/domain.proto";

option go_package = "Aesterial/backend/internal/gen/tickets/v1;tickets";

message CreateRequest {
  string name = 1;
  string email = 2;
  string topic = 3;
  string brief = 4;
  string content = 5;
}

message CreateResponse {
  string id = 1;
  optional string token = 2;
  string tracing = 3;
}

message TicketInfoRequest {
  string id = 1;
  optional string token = 2;
}

message TicketInfo {
  message creatorST {
    optional string name = 1;
    optional string email = 2;
    optional int32 userID = 3;
    bool authorized = 4;
  }
  string id = 1;
  creatorST creator = 2;
  user.v1.UserPublic acceptor = 3;
  string status = 4;
  string topic = 5;
  string brief = 6;
  google.protobuf.Timestamp createdAt = 7;
  optional google.protobuf.Timestamp acceptedAt = 8;
  optional google.protobuf.Timestamp closedAt = 9;
  string closed_by = 10;
  string close_reason = 11;
}

message TicketInfoResponse {
  TicketInfo ticket = 1;
  string tracing = 2;
}

message TicketsListResponse {
  repeated TicketInfo list = 1;
  string tracing = 2;
}

message TicketMessage {
  user.v1.UserPublic author = 1;
  string content = 2;
  google.protobuf.Timestamp at = 3;
}

message TicketMessagesResponse {
  repeated TicketMessage list = 1;
  string tracing = 2;
}

message TicketMessageCreate {
  string id = 1;
  string content = 2;
  string token = 3;
}


message CloseTicketRequest {
  string id = 1;
  optional string reason = 2;
}

message IsValidRequest {
  string id = 1;
  string token = 2;
}

message IsValidResponse {
  bool valid = 1;
  string tracing = 2;
}

message UserTicketsResponse {
    repeated TicketInfo tickets = 1;
    string tracing = 2;
}