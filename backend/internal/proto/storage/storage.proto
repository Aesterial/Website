syntax = "proto3";
package storage.v1;

option go_package = "ascendant/backend/internal/gen/storage/v1;storage";

import "google/api/annotations.proto";
import "storage/domain.proto";

service Storage {
  rpc ReceiveGetPresign(PresignGetRequest) returns (PresignResponse) {
    option (google.api.http) = {
      get: "/api/storage/presign/get"
    };
  }
  rpc ReceivePutPresign(PresignPutRequest) returns (PresignResponse) {
    option (google.api.http) = {
      get: "/api/storage/presign/put"
    };
  }
  rpc GetUserAvatarPresign(UserAvatarRequest) returns (PresignResponse) {
    option (google.api.http) = {
      get: "/api/storage/avatars/user/{userID}"
    };
  }
  rpc ListProjectAvatars(ProjectAvatarsRequest) returns (ProjectAvatarsResponse) {
    option (google.api.http) = {
      get: "/api/storage/avatars/project/{projectID}"
    };
  }
}
