syntax = "proto3";

package projects.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "projects/domain.proto";
import "types.proto";

option go_package = "Aesterial/backend/internal/gen/projects/v1;projects";

service ProjectService {
  rpc Get(GetRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/projects"};
  }
  rpc GetByID(GetProjectRequest) returns (GetProjectResponse) {
    option (google.api.http) = {get: "/api/projects/{id}"};
  }
  rpc ByUID(MadeByRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/projects/by/{user_id}"};
  }
  rpc GetTop(GetTopRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/projects/top"};
  }
  rpc GetArchived(GetRequest) returns (GetResponse) {
    option (google.api.http) = {get: "/api/projects/archived"};
  }
  rpc Create(CreateRequest) returns (CreateResponse) {
    option (google.api.http) = {
      post: "/api/projects/create"
      body: "*"
    };
  }
  rpc ChangeTitle(ChangeRequest) returns (types.WithTracing) {
    option (google.api.http) = {patch: "/api/projects/{id}/name/{to}"};
  }
  rpc ChangeDescription(ChangeRequest) returns (types.WithTracing) {
    option (google.api.http) = {patch: "/api/project/{id}/description/{to}"};
  }
  rpc Delete(RequestWithID) returns (types.WithTracing) {
    option (google.api.http) = {delete: "/api/projects/{id}/delete"};
  }
  rpc Categories(google.protobuf.Empty) returns (CategoriesResponse) {
    option (google.api.http) = {get: "/api/projects/categories"};
  }
  rpc ToggleLike(LikeRequest) returns (types.WithTracing) {
    option (google.api.http) = {post: "/api/projects/like/{id}"};
  }
}
