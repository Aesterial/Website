syntax = "proto3";

package projects.v1;

import "google/protobuf/timestamp.proto";
import "user/domain.proto";

option go_package = "Aesterial/backend/internal/gen/projects/v1;projects";

message GetRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetProjectRequest {
  string id = 1;
}

message MadeByRequest {
  uint32 user_id = 1;
}

message GetTopRequest {
  int32 limit = 1;
  string city = 2;
}

message GetResponse {
  repeated Project projects = 1;
  string tracing = 2;
}

message GetProjectResponse {
  Project project = 1;
  string tracing = 2;
}

message LikeRequest {
  string id = 1;
}

enum ProjectCategory {
  UNSPECIFIED = 0;
  IMPROVEMENT = 1;
  ROADSIDEWALKS = 2;
  LIGHTING = 3;
  PLAYGROUNDS = 4;
  PARKS = 5;
  OTHER = 6;
  UNKNOWN = 7;
}

enum ProjectVoteStatus {
  PUBLISHED = 0;
  PROGRESS = 1;
  IMPLEMENTING = 2;
  CLOSED = 3;
  ARCHIVED = 4;
  INMODERATION = 5;
}

message ProjectLocation {
  string city = 1;
  double latitude = 2;
  double longitude = 3;
}

message ProjectInfo {
  string title = 1;
  string description = 2;
  repeated user.v1.Avatar photos = 3;
  ProjectCategory category = 4;
  ProjectLocation location = 5;
}

message Project {
  string id = 1;
  user.v1.UserPublic author = 2;
  ProjectInfo details = 3;
  ProjectVoteStatus status = 4;
  int32 likes_count = 5;
  repeated user.v1.UserPublic liked = 6;
  google.protobuf.Timestamp createdAt = 7;
}

message CreateRequest {
  string title = 1;
  optional string description = 2;
  repeated user.v1.Avatar photos = 3;
  string category = 4;
  ProjectLocation location = 5;
}

message CreateResponse {
  string id = 1;
  string tracing = 2;
}

message RequestWithID {
  string id = 1;
}

message ChangeRequest {
  string id = 1;
  string to = 2;
}


message CategoriesResponse {
  repeated string categories = 1;
  string tracing = 2;
}
