syntax = "proto3";

package statistics.v1;

import "google/protobuf/timestamp.proto";

option go_package = "Aesterial/backend/internal/gen/statistics/v1;statistics";

message VoteCountResponse {
  uint32 count = 1;
  string tracing = 2;
}

message IdeasCountResponse {
  uint32 count = 1;
  string tracing = 2;
}

message CategoryRecord {
  string name = 1;
  uint32 posts = 2;
}

message TopByCategoriesResponse {
  repeated CategoryRecord record = 1;
  string tracing = 2;
}

message ActiveUsersResponse {
  uint32 count = 1;
  string tracing = 2;
}

message OfflineUsersResponse {
  uint32 count = 1;
  string tracing = 2;
}

message UsersActivity {
  uint32 active = 1;
  uint32 offline = 2;
}

message StatisticsRecap {
  string id = 1;
  google.protobuf.Timestamp at = 2;
  UsersActivity users_activity = 3;
  uint32 new_ideas = 4;
  uint32 vote_count = 5;
}

message IdeasApprovalResponse {
  uint32 approved = 1;
  uint32 waiting = 2;
  uint32 declined = 3;
  string tracing = 4;
}

message UsersActivityRequest {
  uint32 limit = 1;
}

message UsersActivityResponse {
  map<int64, UsersActivity> data = 1;
  string tracing = 2;
}

message CategoriesRequest {
  uint32 limit = 1;
}

message EditorsGradeResponse {
  message Grade {
    uint32 good = 1;
    uint32 bad = 2;
  }

  Grade photos = 1;
  Grade videos = 2;

  string tracing = 4;
}

message MediaCoverageRequest {
  uint32 limit = 1;
}

message MediaCoverageResponse {
  message media {
    uint32 photos = 1;
    uint32 videos = 2;
  }
  repeated media medias = 1;
  string tracing = 2;
}

message WithFromTagRequest {
  google.protobuf.Timestamp since = 1;
}
