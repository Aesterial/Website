syntax = "proto3";

package login.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "login/domain.proto";

option go_package = "Aesterial/backend/internal/gen/login/v1;login";

service LoginService {
  rpc Authorization(AuthRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/login/authorization"
      body: "*"
    };
  }
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/login/register"
      body: "*"
    };
  }
  rpc Logout(google.protobuf.Empty) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/logout"
      body: "*"
    };
  }
  rpc VkStart(google.protobuf.Empty) returns (VKStartResponse) {
    option (google.api.http) = {
      post: "/api/login/vk/start"
      body: "*"
    };
  }
  rpc VkCallback(VKCallbackRequest) returns (VKCallbackResponse) {
    option (google.api.http) = {
      post: "/api/login/vk/callback"
      body: "*"
    };
  }
  rpc VerifyEmailStart(google.protobuf.Empty) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/verify-email/start"
      body: "*"
    };
  }
  rpc ResetPasswordStart(WithEmailRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/reset-password/start"
      body: "*"
    };
  }
  rpc VerifyEmail(VerifyEmailRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/verify-email"
      body: "*"
    };
  }
  rpc ResetPassword(ResetPasswordRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/reset-password"
      body: "*"
    };
  }
  rpc Check(google.protobuf.Empty) returns (EmptyResponse) {
    option (google.api.http) = {get: "/api/login/check"};
  }
  rpc SetupTOTP(google.protobuf.Empty) returns (SetupTOTPResponse) {
    option (google.api.http) = {
      post: "/api/login/2fa/setup"
      body: "*"
    };
  }
  rpc ConfirmTOTP(ConfirmTOTPRequest) returns (ConfirmTOTPResponse) {
    option (google.api.http) = {
      post: "/api/login/2fa/confirm"
      body: "*"
    };
  }
  rpc Reset2FARecovery(Reset2FARecoveryRequest) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/2fa/reset/recovery"
      body: "*"
    };
  }
  rpc CheckTOTP(ConfirmTOTPRequest) returns (CheckTOTPResponse) {
    option (google.api.http) = {
      post: "/api/login/2fa/check"
      body: "*"
    };
  }
}
