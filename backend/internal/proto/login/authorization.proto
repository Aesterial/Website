syntax = "proto3";

package login.v1;
option go_package = "ascendant/backend/internal/gen/login/v1;login";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "login/domain.proto";

service LoginService {
  rpc Authorization(AuthRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/login/authorization"
      body: "*"
    };
  }
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/login/register"
      body: "*"
    };
  }
  rpc Logout(google.protobuf.Empty) returns (EmptyResponse) {
    option (google.api.http) = {
      post: "/api/login/logout"
      body: "*"
    };
  }
}
