syntax = "proto3";

package login.v1;

option go_package = "Aesterial/backend/internal/gen/login/v1;login";

message AuthRequest {
  string usermail = 1;
  string password = 2;
}

message AuthResponse {
  string data = 1;
  string tracing = 2;
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string data = 1;
  string tracing = 2;
}

message EmptyResponse {
  string tracing = 1;
}

message VKStartResponse {
  string auth_url = 1;
  string state = 2;
}

message VKCallbackRequest {
  string code = 1;
  string state = 2;
  string device_id = 3;
}

message VKCallbackResponse {
  string redirect_url = 1;
  string tracing = 2;
}

message WithEmailRequest {
  string email = 1;
}

message VerifyEmailRequest {
  string email = 1;
  string token = 2;
}

message ResetPasswordRequest {
  string email = 1;
  string password = 2;
  string token = 3;
}

message SetupTOTPResponse {
    string qr = 1;
    string url = 2;
    string tracing = 3;
}

message ConfirmTOTPRequest {
    string code = 1;
}

message ConfirmTOTPResponse {
    bool enabled = 1;
    repeated string recovery = 2;
    string tracing = 3;
}

message Reset2FARecoveryRequest {
    string code = 1;
}

message CheckTOTPResponse {
    bool success = 1;
    string tracing = 2;
}
