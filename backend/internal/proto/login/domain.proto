syntax = "proto3";

package login.v1;
option go_package = "ascendant/backend/internal/gen/login/v1;login";

message AuthRequest {
  string usermail = 1;
  string password = 2;
}

message AuthResponse {
  string data = 1;
  string tracing = 2;
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string data = 1;
  string tracing = 2;
}

message EmptyResponse {
  string tracing = 1;
}

message VKStartResponse {
  string auth_url = 1;
  string state = 2;
}

message VKCallbackRequest {
  string code = 1;
  string state = 2;
}

message VKCallbackResponse {
  string redirect_url = 1;
  string tracing = 2;
}