version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../migrations/schema/sqlc.sql"
    queries:
      - "migrations/queries/*.sql"
    gen:
      go:
        package: "dbqueries"
        out: "infra/db/queries"
        sql_package: "pgx/v5"
        emit_exported_queries: true
        overrides:
          - db_type: "event_result"
            go_type: "string"
