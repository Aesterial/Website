name: Build & Push (latest + sha256prefix-date)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        type: choice
        options:
          - backend
          - backend_mail
          - frontend
          - both
        default: both

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.event.head_commit.message, '(docker push)') }}

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        if: ${{ github.event_name != 'workflow_dispatch' }}
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '!backend/mail-proxy/**'
            backend_mail:
              - 'backend/mail-proxy/**'
            frontend:
              - 'frontend/**'

      - name: Resolve build targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          build_backend="false"
          build_backend_mail="false"
          build_frontend="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.target }}" in
              backend)
                build_backend="true"
                ;;
              backend_mail)
                build_backend_mail="true"
                ;;
              frontend)
                build_frontend="true"
                ;;
              both|"")
                build_backend="true"
                build_frontend="true"
                ;;
            esac
          else
            build_backend="${{ steps.changes.outputs.backend }}"
            build_backend_mail="${{ steps.changes.outputs.backend_mail }}"
            build_frontend="${{ steps.changes.outputs.frontend }}"
          fi

          echo "backend=$build_backend" >> "$GITHUB_OUTPUT"
          echo "backend_mail=$build_backend_mail" >> "$GITHUB_OUTPUT"
          echo "frontend=$build_frontend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: ${{ steps.targets.outputs.backend == 'true' || steps.targets.outputs.backend_mail == 'true' || steps.targets.outputs.frontend == 'true' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ steps.targets.outputs.backend == 'true' || steps.targets.outputs.backend_mail == 'true' || steps.targets.outputs.frontend == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date (UTC)
        id: meta
        if: ${{ steps.targets.outputs.backend == 'true' || steps.targets.outputs.backend_mail == 'true' || steps.targets.outputs.frontend == 'true' }}
        run: echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend (latest)
        id: backend_build
        if: ${{ steps.targets.outputs.backend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ivanskem/aesterial-jcup:backend-latest

      - name: Tag backend by digest prefix + date (no rebuild)
        if: ${{ steps.targets.outputs.backend == 'true' }}
        env:
          DIGEST: ${{ steps.backend_build.outputs.digest }}
          DATE: ${{ steps.meta.outputs.DATE }}
        run: |
          SHORT="$(echo "$DIGEST" | sed 's/^sha256://' | cut -c1-12)"
          TAG="backend-sha256${SHORT}-${DATE}"
          docker buildx imagetools create \
            -t "ivanskem/aesterial-jcup:${TAG}" \
            "ivanskem/aesterial-jcup@${DIGEST}"

      - name: Build & push backend mail (latest)
        id: backend_mail_build
        if: ${{ steps.targets.outputs.backend_mail == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend/mail-proxy
          file: ./backend/mail-proxy/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ivanskem/aesterial-jcup:backend-mail-latest

      - name: Tag backend mail by digest prefix + date (no rebuild)
        if: ${{ steps.targets.outputs.backend_mail == 'true' }}
        env:
          DIGEST: ${{ steps.backend_mail_build.outputs.digest }}
          DATE: ${{ steps.meta.outputs.DATE }}
        run: |
          SHORT="$(echo "$DIGEST" | sed 's/^sha256://' | cut -c1-12)"
          TAG="backend-mail-sha256${SHORT}-${DATE}"
          docker buildx imagetools create \
            -t "ivanskem/aesterial-jcup:${TAG}" \
            "ivanskem/aesterial-jcup@${DIGEST}"

      - name: Build & push frontend (latest)
        id: frontend_build
        if: ${{ steps.targets.outputs.frontend == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ivanskem/aesterial-jcup:frontend-latest

      - name: Tag frontend by digest prefix + date (no rebuild)
        if: ${{ steps.targets.outputs.frontend == 'true' }}
        env:
          DIGEST: ${{ steps.frontend_build.outputs.digest }}
          DATE: ${{ steps.meta.outputs.DATE }}
        run: |
          SHORT="$(echo "$DIGEST" | sed 's/^sha256://' | cut -c1-12)"
          TAG="frontend-sha256${SHORT}-${DATE}"
          docker buildx imagetools create \
            -t "ivanskem/aesterial-jcup:${TAG}" \
            "ivanskem/aesterial-jcup@${DIGEST}"
