name: Build & Push (latest + sha256prefix-date)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.event.head_commit.message, '(docker push)') }}

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date (UTC)
        id: meta
        run: echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend (latest)
        id: backend_build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ivanskem/aesterial-jcup:backend-latest

      - name: Tag backend by digest prefix + date (no rebuild)
        env:
          DIGEST: ${{ steps.backend_build.outputs.digest }}
          DATE: ${{ steps.meta.outputs.DATE }}
        run: |
          SHORT="$(echo "$DIGEST" | sed 's/^sha256://' | cut -c1-12)"
          TAG="backend-sha256${SHORT}-${DATE}"
          docker buildx imagetools create \
            -t "ivanskem/aesterial-jcup:${TAG}" \
            "ivanskem/aesterial-jcup@${DIGEST}"

      - name: Build & push frontend (latest)
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ivanskem/aesterial-jcup:frontend-latest

      - name: Tag frontend by digest prefix + date (no rebuild)
        env:
          DIGEST: ${{ steps.frontend_build.outputs.digest }}
          DATE: ${{ steps.meta.outputs.DATE }}
        run: |
          SHORT="$(echo "$DIGEST" | sed 's/^sha256://' | cut -c1-12)"
          TAG="frontend-sha256${SHORT}-${DATE}"
          docker buildx imagetools create \
            -t "ivanskem/aesterial-jcup:${TAG}" \
            "ivanskem/aesterial-jcup@${DIGEST}"
